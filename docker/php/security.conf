# Hardening Apache — PitStop BR

ServerTokens Prod
ServerSignature Off
TraceEnable Off

# Sem isso, ErrorLog cai no arquivo padrão da imagem (/var/log/apache2/error.log,
# num tmpfs — some ao reiniciar o container e nunca aparece em `docker compose
# logs`). error_log() do PHP sob mod_php é roteado pelo log de erro do próprio
# Apache (não pela diretiva error_log do php.ini), incluindo o report-uri do
# CSP (ver Content-Security-Policy abaixo) — sem isso não tem telemetria nenhuma
# visível de verdade.
ErrorLog /dev/stderr

<Directory /var/www/html>
    Options -Indexes -FollowSymLinks
    AllowOverride None
    Require all granted
</Directory>

# Bloqueia acesso a arquivos sensíveis caso sejam copiados por engano para o docroot
<FilesMatch "^\.|\.(env|sql|ini|log|md|yml|yaml)$">
    Require all denied
</FilesMatch>

<IfModule mod_headers.c>
    Header always set X-Content-Type-Options "nosniff"
    Header always set X-Frame-Options "DENY"
    Header always set Referrer-Policy "strict-origin-when-cross-origin"
    Header always set Permissions-Policy "geolocation=(), camera=(), microphone=()"
    # report-uri: navegador manda um POST anônimo (sem cookie/CSRF) pra
    # api/csp_report.php a cada violação bloqueada — dá visibilidade de CSP
    # quebrando algo em produção sem precisar vasculhar console de usuário
    # nenhum. Diretiva legada mas com suporte bem mais amplo que o par
    # Reporting-Endpoints/Report-To da Reporting API nova; simples o
    # suficiente pro que a gente precisa aqui (só telemetria, sem dashboard).
    Header always set Content-Security-Policy "default-src 'self'; connect-src 'self' https://cdn.jsdelivr.net; script-src 'self' https://cdn.jsdelivr.net; style-src 'self' https://cdn.jsdelivr.net 'unsafe-inline'; font-src 'self' https://cdn.jsdelivr.net; img-src 'self' data:; object-src 'none'; base-uri 'self'; frame-ancestors 'none'; report-uri /api/csp_report.php"
    # HSTS: essa app só existe em produção atrás de HTTPS (o :80 no nginx só
    # redireciona pra :443, nunca chega no Apache em texto puro) — força o
    # navegador a nunca mais tentar http:// puro pra esse domínio, fechando
    # a janela de downgrade/SSL-stripping na primeira visita de cada usuário.
    # preload: satisfaz os requisitos técnicos (max-age >= 1 ano +
    # includeSubDomains + preload) pra eventualmente submeter o domínio em
    # hstspreload.org — o header sozinho não entra na lista de pré-carga dos
    # navegadores sem essa submissão manual, mas já deixa a app pronta.
    Header always set Strict-Transport-Security "max-age=31536000; includeSubDomains; preload"
    Header unset X-Powered-By
</IfModule>
