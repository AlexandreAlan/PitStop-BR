<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="PitStop BR">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#23272f"/>
      <stop offset="1" stop-color="#13151a"/>
    </linearGradient>
    <linearGradient id="needle" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffb35c"/>
      <stop offset="1" stop-color="#ff6b35"/>
    </linearGradient>
  </defs>

  <rect width="512" height="512" rx="110" fill="url(#bg)"/>

  <!-- trilha do medidor (fundo) -->
  <path d="M 134.8 364.9 A 148 148 0 1 1 377.2 364.9"
        fill="none" stroke="#ffffff" stroke-opacity="0.12" stroke-width="30" stroke-linecap="round"/>

  <!-- arco ativo do medidor -->
  <path d="M 134.8 364.9 A 148 148 0 1 1 377.2 364.9"
        fill="none" stroke="#ff6b35" stroke-width="30" stroke-linecap="round"
        stroke-dasharray="430 700"/>

  <!-- marcas do medidor -->
  <g stroke="#ffffff" stroke-opacity="0.55" stroke-width="8" stroke-linecap="round">
    <line x1="134.8" y1="364.9" x2="151.1" y2="353.4"/>
    <line x1="113.0" y1="241.7" x2="132.4" y2="246.9"/>
    <line x1="193.5" y1="145.9" x2="201.9" y2="164.0"/>
    <line x1="318.5" y1="145.9" x2="310.1" y2="164.0"/>
    <line x1="399.0" y1="241.7" x2="379.6" y2="246.9"/>
  </g>

  <!-- ponteiro -->
  <line x1="256" y1="280" x2="344.5" y2="218.1" stroke="url(#needle)" stroke-width="16" stroke-linecap="round"/>
  <circle cx="256" cy="280" r="20" fill="#ff6b35"/>
  <circle cx="256" cy="280" r="9" fill="#13151a"/>

  <!-- gota de combustível -->
  <path d="M 256 306 C 287.2 343.6 276 364 256 364 C 236 364 224.8 343.6 256 306 Z"
        fill="#ffffff"/>
</svg>
