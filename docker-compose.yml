services:
  web:
    build:
      context: ./docker/php
    container_name: pitstop_web
    restart: unless-stopped
    ports:
      - "127.0.0.1:8033:80"
    volumes:
      - ./src:/var/www/html:ro
    environment:
      DB_HOST: db
      DB_NAME: ${MYSQL_DATABASE}
      DB_USER: ${MYSQL_USER}
      DB_PASS: ${MYSQL_PASSWORD}
      APP_URL: ${APP_URL:-}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-465}
      SMTP_SECURE: ${SMTP_SECURE:-true}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_FROM: ${SMTP_FROM:-}
      VAPID_PUBLIC_KEY: ${VAPID_PUBLIC_KEY:-}
      VAPID_PRIVATE_KEY: ${VAPID_PRIVATE_KEY:-}
      VAPID_SUBJECT: ${VAPID_SUBJECT:-}
    depends_on:
      db:
        condition: service_healthy
    networks:
      - pitstop_net
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
      - SETUID
      - SETGID
      - CHOWN
    read_only: true
    tmpfs:
      - /tmp
      - /var/run/apache2
      - /var/lock/apache2
      - /var/log/apache2
    deploy:
      resources:
        limits:
          cpus: "0.50"
          memory: 256M

  # Roda cron/enviar_lembretes_push.php e cron/enviar_alertas_push.php de
  # hora em hora: manda notificação push (Web Push) pra quem tem lembrete
  # vencendo/vencido ou alerta inteligente não notificado, mesmo com o app
  # fechado. Mesma imagem do "web", sem servir HTTP nenhum (sem ports).
  cron:
    build:
      context: ./docker/php
    container_name: pitstop_cron
    restart: unless-stopped
    # Só conecta no MySQL e manda e-mail/push — não precisa de root (ao
    # contrário do "web", que precisa dele pro Apache bindar a porta 80 e
    # gerenciar os workers). www-data (33:33) já existe na mesma imagem.
    user: "33:33"
    entrypoint: ["sh", "-c"]
    command:
      - "while true; do php /var/www/html/cron/enviar_lembretes_push.php; php /var/www/html/cron/enviar_alertas_push.php; sleep 3600; done"
    volumes:
      - ./src:/var/www/html:ro
    environment:
      DB_HOST: db
      DB_NAME: ${MYSQL_DATABASE}
      DB_USER: ${MYSQL_USER}
      DB_PASS: ${MYSQL_PASSWORD}
      VAPID_PUBLIC_KEY: ${VAPID_PUBLIC_KEY:-}
      VAPID_PRIVATE_KEY: ${VAPID_PRIVATE_KEY:-}
      VAPID_SUBJECT: ${VAPID_SUBJECT:-}
    depends_on:
      db:
        condition: service_healthy
    networks:
      - pitstop_net
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    read_only: true
    tmpfs:
      - /tmp
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 128M

  db:
    image: mysql:8.0
    container_name: pitstop_db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    volumes:
      - pitstop_db_data:/var/lib/mysql
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 5s
      timeout: 5s
      retries: 10
    # Sem ports mapeado para o host: MySQL acessível apenas dentro da rede interna do Docker.
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
    networks:
      - pitstop_net

volumes:
  pitstop_db_data:

networks:
  pitstop_net:
    driver: bridge
